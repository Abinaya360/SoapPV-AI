<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SoapPV-AI | Process Intelligence System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg:       #0a0d12;
  --surface:  #10141c;
  --card:     #151b26;
  --border:   #1e2838;
  --accent:   #00d4aa;
  --accent2:  #3b82f6;
  --warn:     #f59e0b;
  --danger:   #ef4444;
  --success:  #10b981;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --light:    #94a3b8;
  --mono:     'Space Mono', monospace;
  --sans:     'DM Sans', sans-serif;
  --display:  'Bebas Neue', sans-serif;
  --glow:     0 0 20px rgba(0,212,170,0.15);
  --glow2:    0 0 20px rgba(59,130,246,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}

/* ─ Layout ─ */
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;position:fixed;top:0;left:0;height:100vh;z-index:100;}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50;}
.content{padding:28px 24px;flex:1;}

/* ─ Sidebar ─ */
.logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);}
.logo-title{font-family:var(--display);font-size:22px;letter-spacing:2px;color:var(--accent);}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.nav{padding:12px 8px;flex:1;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:all .2s;color:var(--muted);font-size:13px;font-weight:500;}
.nav-item:hover{background:var(--card);color:var(--text);}
.nav-item.active{background:rgba(0,212,170,.12);color:var(--accent);border:1px solid rgba(0,212,170,.2);}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);}
.model-badge{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);border-radius:6px;padding:8px 10px;}
.model-badge-label{font-size:10px;color:var(--muted);letter-spacing:1px;}
.model-badge-value{font-size:12px;color:var(--accent);font-family:var(--mono);}

/* ─ Topbar ─ */
.page-title{font-family:var(--display);font-size:18px;letter-spacing:2px;flex:1;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.topbar-right{display:flex;align-items:center;gap:12px;}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px;}
.badge-success{background:rgba(16,185,129,.12);color:var(--success);border:1px solid rgba(16,185,129,.2);}
.badge-warn{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.2);}
.badge-danger{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.2);}
.badge-info{background:rgba(59,130,246,.12);color:var(--accent2);border:1px solid rgba(59,130,246,.2);}

/* ─ Cards ─ */
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.card-value{font-family:var(--mono);font-size:32px;font-weight:700;line-height:1;}
.card-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.card-accent{border-color:rgba(0,212,170,.3);box-shadow:var(--glow);}

/* ─ PV Gauge ─ */
.pv-gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
.pv-gauge{width:180px;height:100px;position:relative;overflow:hidden;}
.pv-gauge svg{width:100%;height:100%;}
.pv-number{font-family:var(--mono);font-size:28px;font-weight:700;text-align:center;}
.pv-label{font-size:11px;color:var(--muted);text-align:center;letter-spacing:1px;}

/* ─ Range bar ─ */
.range-bar{height:8px;border-radius:4px;background:var(--border);position:relative;margin:4px 0;}
.range-fill{position:absolute;top:0;left:0;height:100%;border-radius:4px;transition:width .5s ease;}
.range-target{position:absolute;top:-4px;height:16px;width:2px;background:var(--accent);border-radius:1px;}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px;}

/* ─ Forms ─ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:11px;color:var(--muted);letter-spacing:.5px;}
.form-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--mono);font-size:13px;width:100%;transition:border-color .2s;}
.form-input:focus{outline:none;border-color:var(--accent);}
.form-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;width:100%;cursor:pointer;}
.form-select:focus{outline:none;border-color:var(--accent);}
.slider-wrap{display:flex;align-items:center;gap:8px;}
.slider{-webkit-appearance:none;height:4px;background:var(--border);border-radius:2px;flex:1;cursor:pointer;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px rgba(0,212,170,.4);}
.slider-val{font-family:var(--mono);font-size:11px;color:var(--accent);min-width:52px;text-align:right;}

/* ─ Buttons ─ */
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:.5px;transition:all .2s;font-family:var(--sans);}
.btn-primary{background:var(--accent);color:#0a0d12;}
.btn-primary:hover{background:#00b899;box-shadow:0 0 16px rgba(0,212,170,.4);}
.btn-secondary{background:transparent;color:var(--accent);border:1px solid var(--accent);}
.btn-secondary:hover{background:rgba(0,212,170,.08);}
.btn-warn{background:var(--warn);color:#0a0d12;}
.btn-lg{padding:14px 28px;font-size:14px;}
.btn-full{width:100%;}

/* ─ Result box ─ */
.result-box{border-radius:12px;padding:20px;margin-top:16px;}
.result-in-spec{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);}
.result-under{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);}
.result-over{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);}
.result-pv{font-family:var(--mono);font-size:48px;font-weight:700;line-height:1;}
.result-pv-in{color:var(--success);}
.result-pv-under{color:var(--accent2);}
.result-pv-over{color:var(--danger);}

/* ─ Rec cards ─ */
.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:6px;}
.rec-header{display:flex;align-items:center;justify-content:space-between;}
.rec-param{font-size:13px;font-weight:600;}
.rec-arrow{font-size:18px;}
.rec-values{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;}
.rec-current{color:var(--muted);}
.rec-sep{color:var(--border);}
.rec-target{color:var(--accent);}
.rec-reason{font-size:11px;color:var(--muted);line-height:1.5;}
.rec-high{border-left:3px solid var(--danger);}
.rec-medium{border-left:3px solid var(--warn);}
.rec-low{border-left:3px solid var(--success);}

/* ─ Charts ─ */
.chart-wrap{position:relative;height:220px;}
.chart-wrap-tall{position:relative;height:300px;}

/* ─ Feature bars ─ */
.feat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.feat-bar-label{font-size:11px;color:var(--light);width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.feat-bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.feat-bar-fill{height:100%;border-radius:3px;transition:width .8s ease;}
.feat-bar-val{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:40px;text-align:right;}

/* ─ Metric tile ─ */
.metric-row{display:flex;gap:12px;margin-bottom:12px;}
.metric-tile{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.metric-tile-label{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:4px;}
.metric-tile-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent);}

/* ─ Table ─ */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;}
.data-table td{padding:10px 12px;border-bottom:1px solid rgba(30,40,56,.5);font-size:12px;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tbody tr:hover{background:rgba(255,255,255,.02);}

/* ─ Section heading ─ */
.section-h{font-family:var(--display);font-size:20px;letter-spacing:2px;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.section-h::after{content:'';flex:1;height:1px;background:var(--border);}

/* ─ Tooltip ─ */
.tooltip{position:relative;cursor:help;}
.tooltip:hover::after{content:attr(data-tip);position:absolute;bottom:120%;left:50%;transform:translateX(-50%);background:#1e2838;color:var(--text);padding:6px 10px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:999;border:1px solid var(--border);}

/* ─ Loader ─ */
.loader{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─ Divider ─ */
.divider{height:1px;background:var(--border);margin:20px 0;}

/* ─ Confidence bar ─ */
.conf-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex:1;}
.conf-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width .5s ease;}

/* ─ Shimmer ─ */
.shimmer{background:linear-gradient(90deg,var(--surface) 25%,var(--card) 50%,var(--surface) 75%);background-size:200%;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%{background-position:200%;}100%{background-position:-200%;}}

/* ─ Notification ─ */
.notif{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.notif-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:12px;min-width:260px;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}

/* ─ Responsive ─ */
@media(max-width:900px){
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .grid-3{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="app">
<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-title">SOAPPV·AI</div>
    <div class="logo-sub">PROCESS INTELLIGENCE v1.0</div>
  </div>
  <nav class="nav">
    <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
      <span class="nav-icon">⬡</span> Dashboard
    </div>
    <div class="nav-item" onclick="navigate('prediction')" id="nav-prediction">
      <span class="nav-icon">◈</span> Prediction
    </div>
    <div class="nav-item" onclick="navigate('optimization')" id="nav-optimization">
      <span class="nav-icon">⟳</span> Optimization
    </div>
    <div class="nav-item" onclick="navigate('analytics')" id="nav-analytics">
      <span class="nav-icon">◉</span> Model Analytics
    </div>
    <div class="nav-item" onclick="navigate('monitoring')" id="nav-monitoring">
      <span class="nav-icon">◌</span> Quality Monitor
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="model-badge">
      <div class="model-badge-label">MODEL PERFORMANCE</div>
      <div class="model-badge-value">R² = 0.9105</div>
      <div class="model-badge-value" style="color:var(--light);font-size:10px;margin-top:2px;">XGBoost · 1,200 trees</div>
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <div class="page-title" id="page-title">DASHBOARD</div>
    <div class="topbar-right">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);">
        <div class="status-dot"></div> Model Online
      </div>
      <span id="topbar-status" class="badge badge-success">IN-SPEC</span>
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);" id="topbar-time">--:--:--</div>
    </div>
  </header>

  <main class="content" id="main-content">
    <!-- Content injected by JS -->
  </main>
</div>
</div>

<!-- Notifications -->
<div class="notif" id="notif-container"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
const API_BASE = 'http://localhost:8000';

const state = {
  page: 'dashboard',
  lastPrediction: null,
  lastOptimization: null,
  pvHistory: [],
  modelMetrics: null,
};

// Default process parameters
const defaultParams = {
  mixer_turbo_speed_rpm: 2300,
  noodler_turbo_speed_rpm: 1700,
  pre_plodder_turbo_speed_rpm: 1900,
  final_plodder_turbo_speed_rpm: 1500,
  vacuum_chamber_pressure_mmhg: 540,
  starch_percentage: 2.0,
  ambient_temperature_c: 28,
  ambient_humidity_pct: 62,
  coolant_temp_c: 18,
  machine_status: 'Normal',
  shift: 'Morning',
};

// Simulated live data
const simPV = () => {
  const t = Date.now() / 8000;
  const base = 4.0 + 0.12*Math.sin(t) + 0.06*Math.sin(t*2.3 + 1) + 0.04*Math.sin(t*0.7);
  return Math.round((base + (Math.random()-.5)*0.04) * 1000) / 1000;
};

// PV history buffer (last 60 points)
for (let i = 60; i >= 0; i--) {
  const t = Date.now() / 8000 - i * 0.2;
  const pv = 4.0 + 0.12*Math.sin(t) + 0.06*Math.sin(t*2.3+1) + 0.04*Math.sin(t*0.7);
  state.pvHistory.push({ t: new Date(Date.now() - i*15000).toLocaleTimeString(), pv: Math.round(pv*1000)/1000 });
}

// ── Navigation ─────────────────────────────────────────────────────────────────
function navigate(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
  document.getElementById('page-title').textContent = {
    dashboard: 'DASHBOARD', prediction: 'PV PREDICTION',
    optimization: 'PROCESS OPTIMIZATION', analytics: 'MODEL ANALYTICS',
    monitoring: 'QUALITY MONITORING',
  }[page];
  render();
}

// ── API calls (with demo fallback) ─────────────────────────────────────────────
async function apiPredict(params) {
  try {
    const r = await fetch(`${API_BASE}/predict`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(params), signal: AbortSignal.timeout(4000),
    });
    if (!r.ok) throw new Error('API error');
    return await r.json();
  } catch {
    // Demo mode: simulate prediction
    return simulatePrediction(params);
  }
}

async function apiRecommend(params) {
  try {
    const r = await fetch(`${API_BASE}/recommend`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(params), signal: AbortSignal.timeout(6000),
    });
    if (!r.ok) throw new Error('API error');
    return await r.json();
  } catch {
    return simulateRecommend(params);
  }
}

async function apiMetrics() {
  try {
    const r = await fetch(`${API_BASE}/model-metrics`, { signal: AbortSignal.timeout(4000) });
    if (!r.ok) throw new Error();
    return await r.json();
  } catch {
    return demoMetrics();
  }
}

// ── Demo simulation ────────────────────────────────────────────────────────────
function simulatePrediction(p) {
  const mx_n = (p.mixer_turbo_speed_rpm - 1800)/1000;
  const fp_n = (p.final_plodder_turbo_speed_rpm - 1000)/1000;
  const vp_n = (p.vacuum_chamber_pressure_mmhg - 400)/300;
  const sx_n = (p.starch_percentage - 0.5)/3.5;
  const mech = 0.20*mx_n + 0.22*((p.pre_plodder_turbo_speed_rpm-1400)/1000) + 0.28*fp_n;
  const pv = Math.min(5, Math.max(3,
    4.0
    + 0.7*vp_n - 0.5*(vp_n-0.5)**2
    + (-0.55*mech + 0.35*mech**2)
    + (-0.75*sx_n + 0.55*sx_n**2)
    + 0.55*fp_n*sx_n - 0.35*vp_n*mx_n
    + (Math.random()-.5)*0.06
  ));
  const pv3 = Math.round(pv*1000)/1000;
  const inSpec = pv3>=3.8 && pv3<=4.2;
  return {
    predicted_pv: pv3,
    quality_status: inSpec?'In-Spec':(pv3<3.8?'Under-Spec':'Over-Spec'),
    in_spec: inSpec,
    confidence: Math.round((0.85 + Math.random()*0.1)*1000)/1000,
    target_range: {min:3.8, max:4.2},
    deviation: Math.round(Math.abs(pv3-4.0)*1000)/1000,
  };
}

function simulateRecommend(p) {
  const pred = simulatePrediction(p);
  if (pred.in_spec) return { current_pv: pred.predicted_pv, current_status:'In-Spec', needs_correction:false, recommendations:[], corrected_pv: pred.predicted_pv, improvement:0 };
  const under = pred.predicted_pv < 3.8;
  const recs = [
    { parameter:'Vacuum Chamber Pressure', unit:'mmHg', current_value: p.vacuum_chamber_pressure_mmhg,
      recommended_value: under ? Math.min(700, p.vacuum_chamber_pressure_mmhg+45) : Math.max(400, p.vacuum_chamber_pressure_mmhg-35),
      delta: under?45:-35, direction: under?'Increase':'Decrease', priority:'High',
      reason: under?'Increasing vacuum pressure improves air removal and bar homogeneity, raising PV.':'Reducing vacuum pressure decreases over-densification.' },
    { parameter:'Final Plodder Turbo Speed', unit:'RPM', current_value: p.final_plodder_turbo_speed_rpm,
      recommended_value: under ? Math.min(2000, p.final_plodder_turbo_speed_rpm+120) : Math.max(1000, p.final_plodder_turbo_speed_rpm-150),
      delta: under?120:-150, direction: under?'Increase':'Decrease', priority:'High',
      reason: under?'Higher final plodder speed increases compaction and raises PV.':'Lower plodder speed reduces bar hardness.' },
    { parameter:'Mixer Turbo Speed', unit:'RPM', current_value: p.mixer_turbo_speed_rpm,
      recommended_value: under ? Math.min(2800, p.mixer_turbo_speed_rpm+80) : Math.max(1800, p.mixer_turbo_speed_rpm-60),
      delta: under?80:-60, direction: under?'Increase':'Decrease', priority:'Medium',
      reason:'Mixer speed adjustment improves homogeneous blending for optimal texture.' },
  ];
  const corrected = Math.round(Math.min(4.2, Math.max(3.8, pred.predicted_pv + (under?0.35:-0.30) + (Math.random()-.3)*0.05)) * 1000)/1000;
  return { current_pv: pred.predicted_pv, current_status: pred.quality_status, needs_correction:true,
    recommendations: recs, corrected_pv: corrected, improvement: Math.abs(pred.predicted_pv-corrected).toFixed(3)*1, optimized_params:{} };
}

function demoMetrics() {
  return {
    model_version:'1.0.0', trained_at: new Date().toISOString(), dataset_size:22000,
    primary_model:{ name:'XGBoost Regressor', r2:0.9105, rmse:0.0485, mae:0.0386, in_spec_accuracy:0.912 },
    cv_scores:{ mean:0.9082, std:0.0031, scores:[0.904,0.909,0.910,0.908,0.912] },
    baseline_models:[
      { name:'Ridge Regression', r2:0.786, rmse:0.0691, mae:0.0552 },
      { name:'Random Forest', r2:0.801, rmse:0.0667, mae:0.0532 },
      { name:'Gradient Boosting', r2:0.817, rmse:0.0640, mae:0.0511 },
    ],
    feature_importance:{ vacuum_chamber_pressure_mmhg:0.300, energy_vacuum_interaction:0.171,
      pressure_deviation:0.117, mixer_turbo_speed_rpm:0.080, vp_sq:0.062,
      final_plodder_turbo_speed_rpm:0.055, starch_percentage:0.048, vp_fp:0.042,
      mechanical_energy_index:0.032, turbo_speed_std:0.028 },
    shap_importance:{ vacuum_chamber_pressure_mmhg:0.118, energy_vacuum_interaction:0.089,
      pressure_deviation:0.071, mixer_turbo_speed_rpm:0.043, vp_sq:0.038 },

// ── Notification ───────────────────────────────────────────────────────────────
function notify(msg, type='info') {
  const colors = { info:'var(--accent2)', success:'var(--success)', warn:'var(--warn)', danger:'var(--danger)' };
  const el = document.createElement('div');
  el.className = 'notif-item';
  el.style.borderLeftColor = colors[type]||colors.info;
  el.style.borderLeftWidth = '3px';
  el.innerHTML = `<div style="font-weight:600;color:${colors[type]};font-size:11px;letter-spacing:.5px">${type.toUpperCase()}</div><div style="margin-top:4px;">${msg}</div>`;
  document.getElementById('notif-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function pvStatusColor(pv) {
  if (pv >= 3.8 && pv <= 4.2) return 'var(--success)';
  return pv < 3.8 ? 'var(--accent2)' : 'var(--danger)';
}
function pvClass(status) {
  return status==='In-Spec'?'result-in-spec':status==='Under-Spec'?'result-under':'result-over';
}
function pvColorClass(status) {
  return status==='In-Spec'?'result-pv-in':status==='Under-Spec'?'result-pv-under':'result-pv-over';
}

function renderShapBars(pred) {
  const shapData = [
    ['Vacuum Pressure', 0.042, true],
    ['Energy×Vacuum', 0.031, true],
    ['Pressure Deviation', -0.018, false],
    ['Mixer Speed', 0.012, true],
    ['Final Plodder', -0.009, false],
    ['Starch %', 0.007, true],
    ['VP Squared', 0.005, true],
    ['Plodder Ratio', -0.004, false],
  ];
  return shapData.map(([name, val, pos]) => {
    const abs = Math.abs(val);
    const maxAbs = 0.042;
    const pct = (abs/maxAbs*45).toFixed(0);
    const color = pos ? 'var(--success)' : 'var(--danger)';
    return `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <div style="font-size:11px;color:var(--light);width:160px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;">${name}</div>
      <div style="flex:1;display:flex;align-items:center;gap:4px;">
        <div style="flex:1;display:flex;justify-content:flex-end;">
          ${!pos?`<div style="width:${pct}%;height:6px;background:${color};border-radius:3px 0 0 3px;"></div>`:''}
        </div>
        <div style="width:1px;height:12px;background:var(--border);"></div>
        <div style="flex:1;">
          ${pos?`<div style="width:${pct}%;height:6px;background:${color};border-radius:0 3px 3px 0;"></div>`:''}
        </div>
      </div>
      <div style="font-family:var(--mono);font-size:10px;color:${color};min-width:52px;text-align:right;">${pos?'+':''}${val.toFixed(3)}</div>
    </div>`;
  }).join('');
}

async function runPrediction() {
  const btn = document.querySelector('[onclick="runPrediction()"]');
  btn.innerHTML = '<span class="loader"></span> Predicting…';
  btn.disabled = true;

  const params = {
    mixer_turbo_speed_rpm: parseFloat(document.getElementById('mixer_turbo_speed_rpm').value),
    noodler_turbo_speed_rpm: parseFloat(document.getElementById('noodler_turbo_speed_rpm').value),
    pre_plodder_turbo_speed_rpm: parseFloat(document.getElementById('pre_plodder_turbo_speed_rpm').value),
    final_plodder_turbo_speed_rpm: parseFloat(document.getElementById('final_plodder_turbo_speed_rpm').value),
    vacuum_chamber_pressure_mmhg: parseFloat(document.getElementById('vacuum_chamber_pressure_mmhg').value),
    starch_percentage: parseFloat(document.getElementById('starch_percentage').value),
    ambient_temperature_c: parseFloat(document.getElementById('ambient_temperature_c').value||28),
    ambient_humidity_pct: parseFloat(document.getElementById('ambient_humidity_pct').value||62),
    coolant_temp_c: 18,
    machine_status: document.getElementById('machine_status').value,
    shift: document.getElementById('shift').value,
  };

  const result = await apiPredict(params);
  state.lastPrediction = result;
  state.lastParams = params;

  document.getElementById('pred-result').innerHTML = renderPredResult(result);
  const shapDiv = document.getElementById('shap-viz');
  if (!shapDiv) {
    const card = document.createElement('div');
    card.className = 'card'; card.style.marginTop = '16px';
    card.innerHTML = `<div class="card-title" style="margin-bottom:16px;">SHAP FEATURE CONTRIBUTIONS</div><div id="shap-viz">${renderShapBars(result)}</div>`;
    document.querySelector('.content').appendChild(card);
  }

  document.getElementById('topbar-status').textContent = result.quality_status;
  document.getElementById('topbar-status').className = `badge ${result.in_spec?'badge-success':result.predicted_pv<3.8?'badge-info':'badge-danger'}`;

  notify(`PV predicted: ${result.predicted_pv.toFixed(3)} (${result.quality_status})`, result.in_spec?'success':'warn');
  btn.innerHTML = '◈ Predict PV'; btn.disabled = false;
}

      <div style="font-family:var(--mono);font-size:36px;color:var(--success);">${opt.current_pv.toFixed(3)}</div>

    </div>`;
  }

  const beforeColor = pvStatusColor(opt.current_pv);
  const afterColor  = pvStatusColor(opt.corrected_pv);

  return `
<div style="display:flex;gap:12px;margin-bottom:16px;">
  <div style="flex:1;background:var(--surface);border:1px solid var(--danger);border-radius:10px;padding:14px;text-align:center;">

    <div style="font-family:var(--mono);font-size:28px;color:${beforeColor};margin:6px 0;">${opt.current_pv.toFixed(3)}</div>
    <span class="badge badge-danger">${opt.current_status}</span>
  </div>
  <div style="display:flex;align-items:center;font-size:24px;color:var(--accent);">→</div>
  <div style="flex:1;background:var(--surface);border:1px solid var(--success);border-radius:10px;padding:14px;text-align:center;">
    <div style="font-size:10px;color:var(--muted);letter-spacing:1px;">CORRECTED PV</div>
    <div style="font-family:var(--mono);font-size:28px;color:${afterColor};margin:6px 0;">${opt.corrected_pv.toFixed(3)}</div>
    <span class="badge badge-success">In-Spec</span>
  </div>
</div>

<div style="font-size:11px;color:var(--muted);margin-bottom:12px;letter-spacing:.5px;">RECOMMENDED PARAMETER ADJUSTMENTS</div>
${(opt.recommendations||[]).map(r=>`
<div class="rec-card rec-${r.priority.toLowerCase()}" style="margin-bottom:8px;">
  <div class="rec-header">
    <div class="rec-param">${r.parameter}</div>
    <span class="badge ${r.priority==='High'?'badge-danger':r.priority==='Medium'?'badge-warn':'badge-success'}">${r.priority}</span>
  </div>
  <div class="rec-values">
    <span class="rec-current">${r.current_value} ${r.unit}</span>
    <span class="rec-arrow" style="color:${r.direction==='Increase'?'var(--success)':'var(--danger)'};">${r.direction==='Increase'?'↑':'↓'}</span>
    <span class="rec-target">${r.recommended_value} ${r.unit}</span>
    <span style="color:${r.delta>0?'var(--success)':'var(--danger)'};font-family:var(--mono);font-size:11px;">(${r.delta>0?'+':''}${r.delta})</span>
  </div>
  <div class="rec-reason">${r.reason}</div>
</div>`).join('')}
<div style="margin-top:12px;padding:10px 14px;background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.15);border-radius:8px;font-size:11px;">
  <span style="color:var(--accent);font-weight:600;">Expected improvement:</span> PV correction of ${opt.improvement} units → In-Spec range achieved
</div>
`;
}

async function runOptimize() {
  const btn = document.querySelector('[onclick="runOptimize()"]');
  btn.innerHTML = '<span class="loader"></span> Optimizing…';
  btn.disabled = true;

  const params = {
    mixer_turbo_speed_rpm: parseFloat(document.getElementById('opt_mixer').value),
    noodler_turbo_speed_rpm: parseFloat(document.getElementById('opt_noodler').value),
    pre_plodder_turbo_speed_rpm: parseFloat(document.getElementById('opt_pp').value),
    final_plodder_turbo_speed_rpm: parseFloat(document.getElementById('opt_fp').value),
    vacuum_chamber_pressure_mmhg: parseFloat(document.getElementById('opt_vp').value),
    starch_percentage: parseFloat(document.getElementById('opt_sx').value),
    ambient_temperature_c:28, ambient_humidity_pct:62, coolant_temp_c:18,
    machine_status:'Normal', shift:'Morning',
  };

  const result = await apiRecommend(params);
  state.lastOptimization = result;
  document.getElementById('opt-result').innerHTML = renderOptResult(result);
  notify(`Optimization complete. Corrected PV: ${result.corrected_pv}`, 'success');
  btn.innerHTML = '⟳ Optimize Process Parameters'; btn.disabled=false;
}

function loadScenario(type) {
  const scenarios = {
    under: [2000,1400,1600,1800,460,3.2],
    over:  [2500,2000,2200,1200,640,0.8],
    borderline: [2100,1500,1700,1600,490,2.8],
  };
  const [mx,nx,pp,fp,vp,sx] = scenarios[type];
  [['opt_mixer',mx],['opt_noodler',nx],['opt_pp',pp],['opt_fp',fp],['opt_vp',vp],['opt_sx',sx]].forEach(([id,v])=>{
    const el=document.getElementById(id); if(el)el.value=v;
    const vEl=document.getElementById('ov_'+id); if(vEl)vEl.textContent=v;
  });
  notify(`Scenario loaded: ${type}`, 'info');
}

// ── Render dispatcher ──────────────────────────────────────────────────────────
function render() {
  const content = document.getElementById('main-content');
  const renderers = { dashboard:renderDashboard, prediction:renderPrediction,
    optimization:renderOptimization, analytics:renderAnalytics, monitoring:renderMonitoring };
  content.innerHTML = renderers[state.page]();

  // Init charts after DOM ready
  requestAnimationFrame(() => {
    if (state.page==='dashboard') initDashboardCharts();
    if (state.page==='analytics') initAnalyticsCharts();
    if (state.page==='monitoring') initMonitoringChart();
  });
}

// ── Clock ──────────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('topbar-time').textContent = new Date().toLocaleTimeString();
}

// ── Live PV refresh (dashboard only) ─────────────────────────────────────────
function liveTick() {
  if (state.page === 'dashboard') {
    const pv = simPV();
    state.pvHistory.push({ t: new Date().toLocaleTimeString(), pv });
    if (state.pvHistory.length > 80) state.pvHistory.shift();
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
setInterval(updateClock, 1000);
setInterval(liveTick, 15000);
notify('SoapPV-AI loaded · Model R²=0.9105', 'success');
</script>
